<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Riya's Portfolio</title>

    <!-- Google Font -->

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- CSS -->

    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/navbar.css">
    <link rel="stylesheet" href="css/sections.css">
    <link rel="stylesheet" href="css/animations.css">
    <link rel="stylesheet" href="css/responsive.css">

</head>

<body>
    <div class="hero-desktop">

        <!-- NAVBAR -->

        <header class="navbar">

            <div class="logo">
                <img src="assets/images/horizon-logo.svg" alt="Horizon Logo">
            </div>

            <div class="nav-buttons">

                <a href="#" class="resume-btn">Resume</a>

                <a href="#contact" class="connect-btn">Connect</a>

            </div>

        </header>

        <!-- HERO -->
        
        <section id="hero">

            <!-- Background Video -->

            <video
                id="hero-video"
                autoplay
                muted
                playsinline>

                <source src="assets/videos/hero.mp4" type="video/mp4">

            </video>

            <div class="hero-assets">

                <div class="polaroid-wrapper">

                    <img src="assets/images/polaroid.png" class="polaroid" alt="Polaroid">

                    <span class="polaroid-tooltip">
                        Riya & Manu Cat <3
                    </span>

                </div>

                <img src="assets/images/pencil.png" class="pencil" alt="Pencil">

                <img src="assets/images/brush.png" class="brush" alt="Brush">

            </div>

        </section>

        <a href="#" class="mobile-resume">Resume</a>

        <!-- SERVICES -->

        <section id="services">

            <div class="cards-container">

                <a href="#uiux" class="service-card card-left">

                    <img
                        src="assets/images/uiux-card.png"
                        alt="UI UX">

                </a>

                <a href="#graphic" class="service-card card-center">

                    <img
                        src="assets/images/graphic-card.png"
                        alt="Graphic Design">

                </a>

                <a href="#branding" class="service-card card-right">

                    <img
                        src="assets/images/branding-card.png"
                        alt="Branding">

                </a>

            </div>

        </section>

        <!-- ========================================= -->
        <!-- ABOUT -->
        <!-- ========================================= -->

        <section id="about">

            <div class="about-container">

                <div class="about-left">

                    <p>
                        Hi, I'm Riya.
                        Yes, I'll judge your font choices.
                        Creativity is like a natural language to me.
                    </p>

                    <p>
                        I bring the colors, and the fun part of living in this wonderfully visual world.
                    </p>

                </div>

                <div class="about-right">

                    <h2>WHO IS</h2>

                    <h1 class="riya-signature">riya</h1>

                </div>

            </div>

        </section>





        <!-- ========================================= -->
        <!-- PROJECTS -->
        <!-- ========================================= -->

        <section id="work">

            <div class="work-container">

                    <div class="work-bg-text">
                        UIUX
                    </div>

                    <div class="work-heading">

                        <div class="work-title">
                            <span>HER</span>
                            <h2>work</h2>
                        </div>

                        <div class="work-category">
                           ✦ UIUX ✦
                        </div>

                </div>

            </div>

            <div class="sticky-project">

                <a href="earthology.html" class="project-link"></a>

                    <div class="featured-project">

                        <div class="project-bg"></div>

                        <div class="project-window">

                            <img
                                src="assets/images/earthology-full.png"
                                alt="Earthology"
                                class="project-scroll">

                                <div class="project-overlay">
                                    <div class="project-tags">
                                        <span>UIUX</span>
                                        <span>Website</span>
                                        <span>Beauty</span>
                                    </div>
                                </div>

                        </div>

                    </div>
                </a>

            </div>

        </section>

        <section id="projects">

        </section>





        <!-- ========================================= -->
        <!-- CONTACT -->
        <!-- ========================================= -->

        <section id="contact">

        </section>





        <!-- JS -->

        <script src="js/main.js"></script>
        <script src="js/animations.js"></script>
        <script src="js/scroll.js"></script>
    </div>

    <div class="hero-mobile">
        <!-- mobile version -->
    </div>

</body>

</html>
